<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correção por IA | MentorApp</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>

     <header class="main-header">
        <div class="container header-content">
            <div class="header-left">
                <a href="../index.html" class="logo-container">
                    <img src="../assets/img/logo.png" alt="MentorApp" class="logo-img">
                    <span class="logo-text">MentorApp</span>
                </a>
                
                <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            
            <nav class="main-nav" id="mainNav">
                   <ul class="nav-list">
                    <li><a href="../index.html" class="nav-link">Início</a></li>
                    <li><a href="biblioteca.html" class="nav-link">Biblioteca Free</a></li>
                    <li><a href="correcao.html" class="nav-link active">Redação</a></li>
                    <li><a href="contato.html" class="nav-link">Contato</a></li>
                    <li><a href="login.html" class="nav-link" style="font-weight: 700;">Login</a></li>
                    
                    <li class="nav-premium" id="authNavArea">
                        <a href="premium.html" class="nav-link btn-nav-highlight">Seja Premium</a>
                    </li>
                    
                    <li class="nav-theme">
                        <div class="checkbox-wrapper-8">
                            <input type="checkbox" id="theme-toggle-input" class="tgl tgl-skewed">
                            <label for="theme-toggle-input" data-tg-on="DARK" data-tg-off="LIGHT" class="tgl-btn"></label>
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: clamp(100px, 12vw, 120px); max-width: 800px; margin: 0 auto; min-height: 80vh;">
        
        <div class="card fade-in" style="background: var(--surface-color); padding: 30px; border-radius: 16px; box-shadow: var(--shadow-md);">
            <h1 style="color: var(--title-color); margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">
                <i class="ph-fill ph-robot" style="color: var(--accent-color);"></i> Corretor Inteligente
            </h1>
            <p style="color: var(--text-color); margin-bottom: 25px; line-height: 1.6;">
                Envie uma foto legível da sua redação ou o arquivo em PDF. Nossa IA analisará a gramática e os argumentos nos padrões do ENEM.
            </p>

            <form id="aiForm">
                <div style="margin-bottom: 20px; padding: 20px; border: 2px dashed var(--primary-light); border-radius: 12px; text-align: center; background: var(--bg-color);">
                    <input type="file" id="docInput" accept="image/*, application/pdf" hidden required>
                    <label for="docInput" class="btn btn-outline" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin: 0;">
                        <i class="ph ph-upload-simple"></i> Escolher Arquivo (Foto ou PDF)
                    </label>
                    <div id="fileName" style="margin-top: 10px; font-weight: 600; color: var(--text-color);">Nenhum arquivo selecionado.</div>
                </div>

                <button type="submit" class="btn btn-primary" id="btnSubmit" style="width: 100%; font-size: 1.1rem; padding: 15px;">
                    Analisar Redação
                </button>
            </form>

            <div id="resultBox" style="display: none; margin-top: 30px; padding: 25px; background: var(--bg-color); border-radius: 12px; border: 1px solid var(--primary-light);">
                <h3 style="color: var(--accent-color); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                    <i class="ph-fill ph-check-circle"></i> Feedback Detalhado
                </h3>
                <div id="feedbackText" style="white-space: pre-wrap; line-height: 1.6; color: var(--text-color); font-size: 1rem;"></div>
            </div>
        </div>

    </main>

    <script src="../assets/js/mobile-menu.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/correcao.js"></script>
</body>
</html>
