<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | MentorApp</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">

    <nav class="sidebar" id="mainNav">
        <div class="sidebar-header">
            <i class="ph-fill ph-graduation-cap"></i> MentorApp
        </div>
        <ul class="menu">
            <li id="tab-approvals" class="active" onclick="switchTab('approvals')">
                <i class="ph ph-users-three"></i> Aprovações
            </li>
            <li id="tab-ads" onclick="switchTab('ads')">
                <i class="ph ph-megaphone"></i> Anúncios
            </li>
            <li onclick="window.location.href='dashboard.html'">
                <i class="ph ph-house"></i> Voltar ao Site
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <button id="menuToggle" class="menu-toggle show-on-mobile">
                <span></span><span></span><span></span>
            </button>
            <div class="topbar-right">
                <div class="admin-profile">
                    <div class="avatar" id="adminAvatar">A</div>
                    <span id="adminName" class="hide-on-mobile">Admin</span>
                </div>
                <button class="btn-logout" id="logoutBtn">Sair</button>
            </div>
        </header>

        <div class="dashboard">
            <h1 class="page-title">Painel de Controle</h1>

            <div id="section-approvals" class="card fade-in">
                <div class="card-header">
                    <h3><i class="ph ph-clock-counter-clockwise"></i> Cadastros Pendentes</h3>
                </div>
                <div id="usersList">
                    <div class="empty-state">
                        <i class="ph ph-spinner ph-spin" style="font-size: 2rem;"></i>
                        <p>Buscando usuários...</p>
                    </div>
                </div>
            </div>

            <div id="section-ads" class="card fade-in" style="display: none;">
                <div class="card-header">
                    <h3><i class="ph ph-image"></i> Atualizar Banner de Anúncio</h3>
                </div>
                <div style="padding: 10px 0;">
                    <p style="margin-bottom: 15px; color: #666;">Selecione uma imagem do seu computador. Ela aparecerá para todos os usuários na área "Anuncie Aqui".</p>
                    
                    <input type="file" id="adImageInput" accept="image/png, image/jpeg, image/gif" style="margin-bottom: 15px; display: block;">
                    
                    <div id="adPreviewContainer" style="margin-bottom: 15px; display: none;">
                        <img id="adPreview" style="max-width: 100%; max-height: 250px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                    
                    <button onclick="uploadAd()" class="btn btn-primary">Salvar Anúncio</button>
                </div>
            </div>

        </div>
    </main>

    <script src="../assets/js/mobile-menu.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
